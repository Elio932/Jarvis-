<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0a0a1a; color: #00cfff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
    h1 { font-size: 2.5em; text-shadow: 0 0 20px #00cfff; margin-bottom: 10px; }
    p { font-size: 1.8em; opacity: 0.7; margin-bottom: 15px; }
    h2 { margin-bottom: 20px; font-size: 1.5em; opacity: 0.8; }
    .horloge { font-size: 3em; font-weight: bold; text-shadow: 0 0 30px #00cfff; margin-top: 15px; text-align: center; }
    .horloge span { font-size: 0.4em; opacity: 0.7; }
    .recherche { margin-top: 30px; }
    .recherche input { width: 400px; padding: 12px 20px; border-radius: 30px 0 0 30px; border: 2px solid #00cfff; background: transparent; color: #00cfff; font-size: 1em; outline: none; }
    .recherche button { padding: 12px 20px; border-radius: 0 30px 30px 0; border: 2px solid #00cfff; background: #00cfff; color: #0a0a1a; font-size: 1em; cursor: pointer; font-weight: bold; }
    .sites { margin-top: 25px; text-align: center; }
    .grille { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
    .grille a { padding: 10px 20px; height: fit-content; align-self: flex-start; border: 2px solid #00cfff; border-radius: 15px; color: #00cfff; text-decoration: none; font-size: 1em; transition: all 0.3s; }
    .grille a:hover { background: #00cfff; color: #0a0a1a; }
    .dossiers { margin-top: 25px; text-align: center; width: 100%; }
    .dossier { margin-bottom: 10px; }
    .dossier-btn { padding: 10px 30px; background: transparent; border: 2px solid #00cfff; border-radius: 15px; color: #00cfff; font-size: 1em; cursor: pointer; transition: all 0.3s; }
    .dossier-btn:hover { background: #00cfff; color: #0a0a1a; }
    .dossier-contenu { display: none; margin-top: 10px; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .dossier-contenu a { padding: 8px 18px; border: 1px solid #00cfff; border-radius: 10px; color: #00cfff; text-decoration: none; font-size: 0.9em; transition: all 0.3s; }
    .dossier-contenu a:hover { background: #00cfff; color: #0a0a1a; }
    .jarvis-chat { margin-top: 25px; width: 60%; text-align: center; }
    .chat-messages { height: 250px; overflow-y: auto; border: 2px solid #00cfff; border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: left; }
    .message-jarvis { color: #00cfff; margin-bottom: 10px; }
    .message-elio { color: white; margin-bottom: 10px; text-align: right; }
    .chat-input { display: flex; gap: 10px; }
    .chat-input input { flex: 1; border-radius: 25px; padding: 12px 20px; border: 2px solid #00cfff; background: transparent; color: #00cfff; font-size: 1em; outline: none; }
    .chat-input button { padding: 12px 20px; background: #00cfff; color: #0a0a1a; border: none; border-radius: 25px; font-size: 1em; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Bonjour Elio 👋</h1>
  <p>Hey Elio, I'm Jarvis. What can I do for you?</p>
  <div class="horloge" id="horloge"></div>

  <div class="recherche">
    <form action="https://www.google.com/search" target="_blank">
      <input type="text" name="q" placeholder="🔍 Rechercher sur Google...">
      <button type="submit">Chercher</button>
    </form>
  </div>

  <div class="sites">
    <h2>Mes sites</h2>
    <div class="grille">
      <a href="https://www.youtube.com" target="_blank">▶ YouTube</a>
      <a href="https://music.youtube.com" target="_blank">🎵 YouTube Music</a>
      <a href="https://character.ai" target="_blank">🤖 C.ai</a>
      <a href="https://purestream.cc" target="_blank">🎥 Film</a>
      <a href="https://www.aucollege84.vaucluse.fr" target="_blank">🏫 ENT</a>
    </div>
  </div>

  <div class="sites">
    <h2>Mes mails</h2>
    <div class="grille">
      <a href="https://mail.google.com" target="_blank">📧 Gmail</a>
    </div>
  </div>

  <div class="dossiers">
    <h2>Mes dossiers</h2>
    <div class="dossier">
      <button class="dossier-btn" onclick="toggleDossier('scolaire')">📚 Scolaire</button>
      <div class="dossier-contenu" id="scolaire">
        <a href="https://www.kartable.fr" target="_blank">📖 Kartable</a>
        <a href="https://www.lumni.fr" target="_blank">🎓 Lumni</a>
        <a href="https://prof84700.fr/" target="_blank">📝 Lexique HG</a>
      </div>
    </div>
    <div class="dossier">
      <button class="dossier-btn" onclick="toggleDossier('loisirs')">🎮 Loisirs</button>
      <div class="dossier-contenu" id="loisirs">
        <a href="https://www.twitch.tv" target="_blank">🎥 Twitch</a>
        <a href="https://www.reddit.com" target="_blank">💬 Reddit</a>
      </div>
    </div>
    <div class="dossier">
      <button class="dossier-btn" onclick="toggleDossier('outils')">🔧 Outils</button>
      <div class="dossier-contenu" id="outils">
        <a href="https://www.google.com/maps" target="_blank">🗺️ Google Maps</a>
        <a href="https://translate.google.com" target="_blank">🌍 Traducteur</a>
      </div>
    </div>
  </div>

  <div class="jarvis-chat">
    <h2>🤖 Jarvis</h2>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Parle à Jarvis...">
      <button onclick="envoyerMessage()">Envoyer</button>
    </div>
  </div>

  <script>
    function majHorloge() {
      const maintenant = new Date();
      const heures = String(maintenant.getHours()).padStart(2, '0');
      const minutes = String(maintenant.getMinutes()).padStart(2, '0');
      const secondes = String(maintenant.getSeconds()).padStart(2, '0');
      const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
      const mois = ['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
      const jour = jours[maintenant.getDay()];
      const date = maintenant.getDate();
      const moisNom = mois[maintenant.getMonth()];
      const annee = maintenant.getFullYear();
      document.getElementById('horloge').innerHTML = heures + ':' + minutes + ':' + secondes + '<br><span>' + jour + ' ' + date + ' ' + moisNom + ' ' + annee + '</span>';
    }
    setInterval(majHorloge, 1000);
    majHorloge();

    function toggleDossier(id) {
      const contenu = document.getElementById(id);
      if (contenu.style.display === 'none' || contenu.style.display === '') {
        contenu.style.display = 'flex';
      } else {
        contenu.style.display = 'none';
      }
    }

    async function envoyerMessage() {
      const input = document.getElementById('user-input');
      const messages = document.getElementById('messages');
      const texte = input.value.trim();
      if (!texte) return;
      messages.innerHTML += '<div class="message-elio">vous : ' + texte + '</div>';
      input.value = '';
      messages.innerHTML += '<div class="message-jarvis">Jarvis : En train de reflechir...</div>';
      try {
       const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer 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'
  },
  body: JSON.stringify({
    inputs: "Tu es Jarvis, assistant IA d'Elio. Tu parles comme Jarvis dans Iron Man. Reponds a : " + texte
  })
});
const data = await response.json();
const reponse = data[0].generated_text.split("Reponds a : " + texte).pop().trim();
        const dernierMessage = messages.lastElementChild;
        dernierMessage.innerHTML = 'Jarvis : ' + reponse;
        messages.scrollTop = messages.scrollHeight;
      } catch(err) {
        const dernierMessage = messages.lastElementChild;
        dernierMessage.innerHTML = 'Jarvis : Erreur de connexion...';
        console.log(err);
      }
    }

    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') envoyerMessage();
    });
  </script>

</body>
</html>
