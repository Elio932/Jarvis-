<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis V5 ULTIME</title>
<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#050505;
  color:white;
  overflow:hidden;
}

/* Background spider effect */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.sidebar {
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100%;
  background:#0a0a0a;
  border-right:2px solid red;
  padding:20px;
  z-index:2;
}

.sidebar button {
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  background:black;
  border:1px solid red;
  color:red;
  cursor:pointer;
}

.main {
  margin-left:240px;
  padding:20px;
  position:relative;
  z-index:2;
}

.hud {
  border:2px solid red;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px red;
}

.cinema {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  z-index:5;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

.alert {
  position:fixed;
  top:20px;
  right:20px;
  background:red;
  padding:10px;
  display:none;
  z-index:10;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="sidebar">
  <button onclick="openChatGPT()">🤖 ChatGPT</button>
  <button onclick="toggleCinema()">🎬 Mode Cinéma</button>
  <button onclick="startPomodoro()">⏱ Focus</button>
  <button onclick="enemyAlert()">💥 Alerte</button>
</div>

<div class="main">
  <div class="hud">
    <h1>🕷 Jarvis V5</h1>
    <p>Système opérationnel Spider Edition</p>
  </div>
</div>

<div class="cinema" id="cinema">
  <iframe src="https://purstream.art"></iframe>
</div>

<div class="alert" id="alert">⚠ Ennemi détecté</div>

<script>
// Spider web animation
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];
for(let i=0;i<80;i++){
  points.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="red";
  points.forEach(p=>{
    ctx.fillRect(p.x,p.y,2,2);
    points.forEach(p2=>{
      let d=Math.hypot(p.x-p2.x,p.y-p2.y);
      if(d<120){
        ctx.strokeStyle="rgba(255,0,0,0.2)";
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(p2.x,p2.y);
        ctx.stroke();
      }
    });
  });
}
setInterval(draw,30);

// Features
function openChatGPT(){
  window.open("https://chat.openai.com","_blank");
}

function toggleCinema(){
  let c=document.getElementById("cinema");
  c.style.display = c.style.display==="block"?"none":"block";
}

function startPomodoro(){
  alert("Focus 25 minutes 🔥");
}

function enemyAlert(){
  let a=document.getElementById("alert");
  a.style.display="block";
  setTimeout(()=>a.style.display="none",3000);
}

</script>

</body>
</html>
